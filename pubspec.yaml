name: story_book_creator
description: A Story Book Creator app - create, write and manage beautiful stories.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  supabase_flutter: ^2.5.0
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  provider: ^6.1.1
  path: ^1.9.0
  image_picker: ^1.0.7  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1   # 👈 ضفناها


flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png 
